name: Python Playwright Tests

on:
  push:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SELECTED_BROWSER: ${{ github.event.inputs.browser || 'chromium' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          cd python-playwright
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          cd python-playwright
          playwright install --with-deps

      - name: Install unzip (system package)
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/latest/download/allure-commandline.zip -o allure-commandline.zip
          unzip -q allure-commandline.zip -d allure-cli
          sudo mv allure-cli/allure-*/ /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Run tests
        run: |
          cd python-playwright
          mkdir -p reports/allure-results
          pytest --browser "${SELECTED_BROWSER}" --alluredir=reports/allure-results

      - name: Generate Allure HTML report
        if: always()
        run: |
          allure generate python-playwright/reports/allure-results \
            --clean -o python-playwright/reports/allure-report

      - name: Upload Allure results (raw JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-python
          path: python-playwright/reports/allure-results

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-html
          path: python-playwright/reports/allure-report
